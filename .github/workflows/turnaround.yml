name: Turnaround Scan

# Runs on GitHub's servers — fires regardless of whether your machine is on.
on:
  schedule:
    # 05:30 UTC = 11:00 IST, every day. The multibagger scan runs at the same
    # time, so the commit step below retries on push conflicts to avoid races.
    - cron: "30 5 * * *"
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # allow the job to commit the report back to the repo

jobs:
  turnaround:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run turnaround scan
        env:
          # Optional email delivery — reuses the same secrets as the multibagger scan.
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Optional tuning (defaults match README). Uncomment to override:
          # MCAP_MIN: "500"
          # MCAP_MAX: "75000"
          # NEAR_LOW_PCT: "15"
          # PAGE_DELAY: "0.7"
        run: python turnaround.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No report changes to commit."; exit 0
          fi
          git commit -m "Turnaround scan $(date -u +%Y-%m-%d)"
          # The multibagger scan commits at the same time — retry on push races.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "push attempt $i failed (likely concurrent commit); retrying..."
            sleep 5
          done
          echo "Could not push after retries."; exit 1
