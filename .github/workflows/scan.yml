name: Multibagger Scan

# Runs on GitHub's servers — fires regardless of whether your machine is on.
on:
  schedule:
    # 02:30 UTC = 08:00 IST, every alternate day (day-of-month step of 2).
    - cron: "30 2 */2 * *"
  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # allow the job to commit the report back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          # Optional email delivery. Set these as repository secrets to enable.
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scan.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Scan report $(date -u +%Y-%m-%d)"
          git push
